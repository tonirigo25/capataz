<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Orqena sin conexión</title>
    <style>
      body{font-family:system-ui,sans-serif;margin:0;background:#f6f7f8;color:#1f2428;display:grid;min-height:100vh;place-items:center;padding:1.5rem}
      main{max-width:32rem;background:#fff;border:1px solid #d8dde2;border-radius:1rem;padding:1.5rem}
      h1{font-size:1.4rem;margin:0 0 .75rem}p{line-height:1.6;margin:.5rem 0}button{margin-top:1rem;padding:.75rem 1rem;border:0;border-radius:.65rem;background:#1f2428;color:#fff;font-weight:700}
    </style>
  </head>
  <body>
    <main>
      <h1>Sin conexión</h1>
      <p>Orqena no guarda aquí clientes, trabajos, facturas ni otros datos privados.</p>
      <p>Recupera la conexión y vuelve a intentarlo.</p>
      <button type="button" onclick="location.reload()">Reintentar</button>
    </main>
  </body>
</html>
